# LiteLLM proxy config — Phase 1 (brain/litellm-phase1).
#
# Single upstream: Anthropic API via the operator's ANTHROPIC_API_KEY (a
# workspace-scoped sk-ant-api03-... key from the workspace-sandbox workspace).
# Per-agent virtual keys are provisioned at runtime via /key/generate against
# this proxy's master_key, and the orchestrator's lifecycle.ts injects them
# per-spawn (see scripts/provision-litellm-keys.sh + src/orchestrator/lifecycle.ts).
#
# Model-cost-table staleness (R3 mitigation per /pages/brain-litellm-pilot-risks-addendum):
#   - The litellm-proxy image is SHA-pinned in docker-compose.yml — NOT main-latest.
#   - Bumping the image needs to be a deliberate brain action with the freshness-check
#     cron alerting when a new release would change Anthropic pricing entries.

model_list:
  # Canonical Anthropic models the conductor agents call today.
  # Adding a new model: append here, restart proxy. New models are NOT
  # auto-discovered.
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  # master_key is the proxy-admin credential used to call /key/generate,
  # /spend/keys, /spend/users, /key/info. Sourced from env so it never lands
  # in the repo. Generated by the operator at first-run and persisted to
  # ~/.config/agentic-collab/litellm-keys.json (gitignored).
  master_key: os.environ/LITELLM_MASTER_KEY
  # SQLite spend-tracking DB. Survives container restarts via the named
  # volume in docker-compose.yml. For high-volume Phase 2 deployments swap
  # to Postgres; SQLite is fine at <10k req/day.
  database_url: sqlite:////data/litellm.db
  # store_model_in_db: false keeps the model_list authoritatively in this
  # yaml file rather than letting Console writes drift it. Cleaner for a
  # config-as-code workflow.
  store_model_in_db: false

# Track per-key spend; surface via /spend/keys + /spend/users for the
# /pages/conductor-llm-spend dashboard view.
litellm_settings:
  set_verbose: false
  drop_params: true  # tolerate Anthropic-only params from CC without 400-ing
  # Cache layer: disable for Phase 1 — would conflate attribution data.
  # Phase 3 candidate when we have multi-tenant ratelimit pressure.
  cache: false
